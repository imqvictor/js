<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <nav>
            <h2>Apps</h2>
        </nav>
        <hr>
        <main>
            <div class="apps">
                <div class="img-wrapper">
                    <img src="assets/dropbox.svg" alt="drop box" width="50px">
                    <p class="desc">Dropbox</p>
                    <div class="btn">
                        <img src="assets/plus.svg" alt="plus" width="50px">
                        <p>ADD</p>
                    </div>
                </div>
                <button type="button">ADD MORE APPS</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
